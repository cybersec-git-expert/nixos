# ── Font ───────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ── Shell integration ─────────────────────────────────────────────────────────
# Enables: cwd tracking, marks, scrollback-in-editor, clone-in-new-window
shell_integration         enabled

# ── Transparency — matches the frosted bar aesthetic (base color + slight alpha) ─
background_opacity        0.92
dynamic_background_opacity yes

# ── Window ─────────────────────────────────────────────────────────────────────
window_padding_width      10
hide_window_decorations   yes
confirm_os_window_close   0

# ── Cursor ─────────────────────────────────────────────────────────────────────
cursor_shape        block
cursor_blink_interval 0

# ── Scrollback ─────────────────────────────────────────────────────────────────
scrollback_lines    10000

# ── Tab bar ────────────────────────────────────────────────────────────────────
tab_bar_style       powerline
tab_powerline_style slanted

# ── Dynamic colors (updated on every wallpaper change via matugen_reload.sh) ───
# background key maps to qs_colors.json "base" (see ~/.config/hypr/matugen/qs_colors.json)
include kitty-matugen-colors.conf
