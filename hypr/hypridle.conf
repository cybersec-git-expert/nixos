general {
    # No automatic locking. (Manual lock: Super+L)
    # lock_cmd = ~/.config/hypr/scripts/hyprlock-with-wallpaper.sh
    # before_sleep_cmd = ~/.config/hypr/scripts/hyprlock-with-wallpaper.sh
    # DPMS wake + re-apply wallpaper (swww/mpvpaper often lose the surface after display sleep).
    # Long sleep: GPU/DRM can need extra time before dpms + Hyprland accept input again.
    after_sleep_cmd = sleep 5 && hyprctl dispatch dpms on && sleep 0.4 && hyprctl dispatch dpms off && sleep 0.6 && hyprctl dispatch dpms on && sleep 0.5 && bash /home/cyberexpert/.config/hypr/scripts/wallpaper-manager.sh init
}

## Auto-lock/DPMS listeners disabled by request.

