general {
    # No automatic locking. (Manual lock: Super+L)
    # lock_cmd = ~/.config/hypr/scripts/hyprlock-with-wallpaper.sh
    # before_sleep_cmd = ~/.config/hypr/scripts/hyprlock-with-wallpaper.sh
    # NVIDIA + multi-monitor: give the stack a bit longer after S3 before forcing DPMS on.
    after_sleep_cmd = sleep 1.5 && hyprctl dispatch dpms on
}

## Auto-lock/DPMS listeners disabled by request.

