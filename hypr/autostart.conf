# Core system processes - start immediately and asynchronously
exec-once = hyprpm reload
# hypridle is started from hyprland.conf — do not start twice here.
exec-once = swayosd-server --top-margin 0.06 --style "$HOME/.config/swayosd/style.css"

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = killall -e xdg-desktop-portal-hyprland; killall -e xdg-desktop-portal-wlr; killall xdg-desktop-portal; sleep 1; /usr/lib/xdg-desktop-portal-hyprland & sleep 2; /usr/lib/xdg-desktop-portal &

exec-once = sleep 3 && ~/.config/hypr/scripts/wallpaper-manager.sh init
exec-once = sleep 3 && ~/.config/hypr/scripts/set-default-audio.sh

# AGS top bar (GTK layer shell)
exec-once = bash ~/.config/hypr/scripts/autostart_ags.sh
# Notifications: started from hyprland.conf (exec-once = dunst)
# FocusTime daemon (writes ~/.cache/focustime/focustime_state.json)
exec-once = python3 ~/.config/hypr/scripts/focustime/focus_daemon.py &
exec-once = udiskie --config /home/cyberexpert/.config/udiskie/config.yml --tray

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

exec-once = ~/.config/scripts/startup/monitor-event-handler.sh
exec-once = sleep 4 && bash /home/cyberexpert/.config/hypr/scripts/restore-session-after-login.sh
