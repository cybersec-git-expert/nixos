# Core system processes - start immediately and asynchronously
exec-once = hyprpm reload
# exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 # Binary not found, user needs to install a polkit agent
# hypridle is started from hyprland.conf (sleep resume → dpms on). Do not start twice here.
# exec-once = hypridle
# top-margin: fraction from top of screen (0–1). 0.9 was ~bottom; ~0.06 aligns with top-bar / Quickshell toasts.
exec-once = swayosd-server --top-margin 0.06 --style "$HOME/.config/swayosd/style.css"

# Fix for XDG Desktop Portal (likely cause of "missing requirements" and crashes)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = killall -e xdg-desktop-portal-hyprland; killall -e xdg-desktop-portal-wlr; killall xdg-desktop-portal; sleep 1; /usr/lib/xdg-desktop-portal-hyprland & sleep 2; /usr/lib/xdg-desktop-portal &

# exec-once = ~/.config/scripts/startup/wallpaper-resume.sh & # Disabled in favor of hypridle

# Essential UI components with proper Wayland environment
# Slight delay so Hyprland outputs exist before swww (avoids black wallpaper until manual re-apply).
exec-once = sleep 3 && ~/.config/hypr/scripts/wallpaper-manager.sh init

# Force audio output to PC speakers (avoid HDMI monitor audio)
exec-once = sleep 3 && ~/.config/hypr/scripts/set-default-audio.sh

# Quickshell — waits for hyprctl then starts Main + TopBar (bash: works even if +x is missing)
exec-once = bash ~/.config/hypr/scripts/quickshell/autostart_quickshell.sh
# FocusTime dashboard + live stats (writes ~/.cache/focustime/focustime_state.json)
exec-once = python3 ~/.config/hypr/scripts/quickshell/focustime/focus_daemon.py &
exec-once = udiskie --config /home/cyberexpert/.config/udiskie/config.yml --tray

# Productivity tools
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# dunst removed — Quickshell NotificationServer handles notifications
# exec-once = dunst

# Monitor event handler - fixes terminal positions when monitor reconnects
exec-once = ~/.config/scripts/startup/monitor-event-handler.sh

# One-shot restore of apps/workspaces after reboot if enabled from power menu (Super+Shift+Q)
exec-once = sleep 4 && bash /home/cyberexpert/.config/hypr/scripts/restore-session-after-login.sh
