# =============================================================================
# Window rules (windowrulev2) — dialogs float + fullscreen polish
# Reload: hyprctl reload
# =============================================================================

# -----------------------------------------------------------------------------
# Float: auth, portals, audio/network/bluetooth, small utilities
# -----------------------------------------------------------------------------
windowrulev2 = float, class:^(org\.kde\.polkit-kde-authentication-agent-1)$
windowrulev2 = float, class:^(polkit-gnome-authentication-agent-1)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, class:^(xdg-desktop-portal-kde)$
windowrulev2 = float, class:^(gtk.portal.filechooser)$
windowrulev2 = float, class:^(qt.portal.filechooser)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(org\.pulseaudio\.pavucontrol)$
windowrulev2 = float, class:^(pavucontrol-qt)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(blueman-services)$
windowrulev2 = float, class:^(blueman-adapters)$
windowrulev2 = float, class:^(org\.gnome\.Calculator)$
windowrulev2 = float, class:^(org\.kde\.kcalc)$
windowrulev2 = float, class:^(io\.gitlab\.Qalculate\.qalculate-qt)$
windowrulev2 = float, class:^(org\.gnome\.baobab)$
windowrulev2 = float, class:^(org\.gnome\.DiskUtility)$
windowrulev2 = float, class:^(org\.kde\.ark)$
windowrulev2 = float, class:^(org\.gnome\.FileRoller)$
windowrulev2 = float, class:^(org\.gnome\.Extensions)$
windowrulev2 = float, class:^(gcr-prompter)$
windowrulev2 = float, class:^(pkexec)$
windowrulev2 = float, class:^(yad)$
windowrulev2 = float, class:^(zenity)$
windowrulev2 = float, class:^(kvantummanager)$
windowrulev2 = float, class:^(qt6ct)$
windowrulev2 = float, class:^(qt5ct)$
windowrulev2 = float, class:^(org\.fwupd\.fwupd)$
windowrulev2 = float, class:^(org\.fcitx\.Fcitx5-config-qt)$
windowrulev2 = float, class:^(fcitx-config-gtk)$
windowrulev2 = float, class:^(ibus-setup)$
windowrulev2 = float, class:^(ibus-extension-gtk)$
windowrulev2 = float, class:^(winecfg)$
windowrulev2 = float, class:^(winetricks)$
windowrulev2 = float, class:^(lxappearance)$
windowrulev2 = float, class:^(copyq)$
windowrulev2 = float, class:^(clipse)$
windowrulev2 = float, class:^(guiscrcpy)$

# Steam: only auxiliary windows (main Big Picture stays tiled unless you togglefloat)
windowrulev2 = float, class:^(steam)$, title:^(Friends List)$
windowrulev2 = float, class:^(steam)$, title:^(Steam - .*News.*)$
windowrulev2 = float, class:^(steam)$, title:^(Special Offers)$

# Brave / Chromium Picture-in-Picture
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = keepaspectratio, title:^(Picture-in-Picture)$

# Password prompts
windowrulev2 = stayfocused, class:^(pinentry-.*)$
windowrulev2 = stayfocused, title:^(.*Unlock Keyring.*)$
windowrulev2 = stayfocused, class:^(gcr-prompter)$

# -----------------------------------------------------------------------------
# Spawn position / size for floats
# -----------------------------------------------------------------------------
windowrulev2 = center, class:^(pavucontrol)$
windowrulev2 = center, class:^(nm-connection-editor)$
windowrulev2 = center, class:^(blueman-manager)$
windowrulev2 = center, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = center, class:^(xdg-desktop-portal-kde)$
windowrulev2 = center, class:^(org\.kde\.polkit-kde-authentication-agent-1)$
windowrulev2 = center, class:^(polkit-gnome-authentication-agent-1)$
windowrulev2 = center, class:^(org\.gnome\.Calculator)$
windowrulev2 = center, class:^(org\.kde\.kcalc)$
windowrulev2 = center, title:^(Picture-in-Picture)$

windowrulev2 = size 70% 65%, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = size 70% 65%, class:^(xdg-desktop-portal-kde)$
windowrulev2 = size 60% 55%, class:^(pavucontrol)$
windowrulev2 = size 55% 60%, class:^(nm-connection-editor)$
windowrulev2 = size 50% 55%, class:^(blueman-manager)$
windowrulev2 = size 420 340, title:^(Picture-in-Picture)$

# -----------------------------------------------------------------------------
# Real fullscreen (mode 2): crisp edges, no blur on that surface
# -----------------------------------------------------------------------------
windowrulev2 = noborder, fullscreen:2
windowrulev2 = rounding 0, fullscreen:2
windowrulev2 = noblur, fullscreen:2
windowrulev2 = opacity 1.0 override 1.0 override, fullscreen:2
