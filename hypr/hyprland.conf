# Monitors: connector names change across reboots. `monitor=desc:…` in this file is not
# reliably applied on `hyprctl reload` (layout snaps to side‑by‑side). Layout is applied by
# ~/.config/hypr/scripts/apply-monitor-layout.sh via EDID serials (see script).
# `hyprctl monitors` → description contains PC2M024802637 (MSI), 6CM1420GCS (HP).
# `exec` runs on every reload; `exec-once` covers first login before any reload.
exec = ~/.config/hypr/scripts/apply-monitor-layout.sh
exec-once = sleep 0.4 && ~/.config/hypr/scripts/apply-monitor-layout.sh

# Force workspace placement (alternate per monitor):
# Odd workspaces → MSI, Even workspaces → HP
workspace = 1,  monitor:desc:PC2M024802637, default:true
workspace = 2,  monitor:desc:6CM1420GCS, default:true
workspace = 3,  monitor:desc:PC2M024802637
workspace = 4,  monitor:desc:6CM1420GCS
workspace = 5,  monitor:desc:PC2M024802637
workspace = 6,  monitor:desc:6CM1420GCS
workspace = 7,  monitor:desc:PC2M024802637
workspace = 8,  monitor:desc:6CM1420GCS
workspace = 9,  monitor:desc:PC2M024802637
workspace = 10, monitor:desc:6CM1420GCS
workspace = 11, monitor:desc:PC2M024802637
workspace = 12, monitor:desc:6CM1420GCS
workspace = 13, monitor:desc:PC2M024802637
workspace = 14, monitor:desc:6CM1420GCS
workspace = 15, monitor:desc:PC2M024802637
workspace = 16, monitor:desc:6CM1420GCS
workspace = 17, monitor:desc:PC2M024802637
workspace = 18, monitor:desc:6CM1420GCS
workspace = 19, monitor:desc:PC2M024802637
workspace = 20, monitor:desc:6CM1420GCS

$terminal    = kitty
$fileManager = dolphin
$launcher    = rofi -show drun
$browser     = brave

# Autostart
# hypridle: no idle timers in hypridle.conf — only hooks system sleep so
# `after_sleep_cmd` runs `hyprctl dispatch dpms on` after resume (fixes black monitors).
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = swayosd-server --top-margin 0.06
exec-once = udiskie --tray
exec-once = nm-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = sleep 3 && ~/.config/hypr/scripts/set-default-audio.sh --watch
exec-once = sleep 3 && ~/.config/hypr/scripts/wallpaper-manager.sh init
exec-once = bash ~/.config/hypr/scripts/autostart_ags.sh
exec-once = dunst

# Environment
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = WLR_NO_HARDWARE_CURSORS,1
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = LIBSEAT_BACKEND,logind
env = NIXOS_OZONE_WL,1
env = GTK_THEME,Adwaita:dark
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_PLUGIN_PATH,/run/current-system/sw/lib/qt-6/plugins
env = QT_SCALE_FACTOR,1

general {
    gaps_in = 10
    gaps_out = 20
    border_size = 0
    col.active_border = rgba(33ccffee)
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    extend_border_grab_area = 20
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.8
    dim_inactive = true
    dim_strength = 0.1
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        noise = 0.02
        contrast = 1.1
        brightness = 1.2
        vibrancy = 0.3
        vibrancy_darkness = 0.2
        popups = true
        popups_ignorealpha = 0.6
        special = false
    }
}

animations {
    enabled = yes
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = quick, 0.15, 0, 0.1, 1
    bezier = bouncy, 0.1, 0.9, 0.2, 1.1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    animation = windows,          1, 5, overshot,    popin 80%
    animation = windowsIn,        1, 5, overshot,    popin 80%
    animation = windowsOut,       1, 5, quick,       popin 80%
    animation = windowsMove,      1, 5, bouncy
    animation = fadeIn,           1, 3, easeOutQuint
    animation = fadeOut,          1, 3, easeOutQuint
    animation = fade,             1, 4, easeOutQuint
    animation = workspaces,       1, 5, overshot,    slide
    animation = specialWorkspace, 1, 5, overshot, slidevert
    animation = border,           1, 4, easeOutQuint
    animation = layers,           1, 5, easeOutQuint, fade
    animation = layersIn,         1, 5, easeOutQuint, fade
    animation = layersOut,        1, 3, quick,        fade
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    # NVIDIA + some clients: VFR can cause visible flicker/frame skipping.
    vfr = false
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = no
    }
}

# Prefer the HP panel for default cursor / “primary” feel when the top monitor is listed first.
cursor {
    default_monitor = desc:6CM1420GCS
}

gestures {
    workspace_swipe_distance = 300
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_min_speed_to_force = 30
}

$mainMod = SUPER

# Apps
bind = $mainMod,       RETURN, exec, $terminal
bind = $mainMod,       TAB,    exec, $launcher
bind = $mainMod,       E,      exec, $fileManager
bind = $mainMod,       B,      exec, $browser
bind = $mainMod,       G,      exec, code --ozone-platform=wayland
bind = $mainMod,       O,      exec, obsidian obsidian://vault/Cyber
bind = $mainMod,       F5,     exec, kitty -e btop

# Window management
bind = $mainMod,       Q,   exec, ~/.config/hypr/scripts/confirm_close.sh
bind = $mainMod SHIFT, Q,      exec, ~/.config/hypr/scripts/rofi-power-menu.sh
bind = $mainMod,       F,   togglefloating
# Fullscreen: mode 1 = “maximize” in layout (keep gaps feel); mode 2 = real fullscreen; mode 0 = exit fullscreen
bind = $mainMod,       F11, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 2
bind = $mainMod CTRL,  F, fullscreen, 0
bind = $mainMod,       P, pin
bind = $mainMod,       J,   togglesplit
bind = $mainMod,       L,   exec, ~/.config/hypr/scripts/hyprlock-with-wallpaper.sh
bind = $mainMod,       R,   exec, hyprctl reload

# Screenshots
bind = , PRINT,           exec, bash ~/.config/hypr/scripts/screenshot.sh --menu
bind = $mainMod SHIFT, S, exec, bash ~/.config/hypr/scripts/screenshot.sh --area

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
# When monitor rules were wrong, focus stayed on one head — jump by output anyway
bind = $mainMod SHIFT, left,  focusmonitor, l
bind = $mainMod SHIFT, right, focusmonitor, r
bind = $mainMod SHIFT, up,    focusmonitor, u
bind = $mainMod SHIFT, down,  focusmonitor, d

# Resize floating windows
bind = $mainMod CTRL, H, resizeactive, -50 0
bind = $mainMod CTRL, L, resizeactive,  50 0
bind = $mainMod CTRL, K, resizeactive, 0 -50
bind = $mainMod CTRL, J, resizeactive, 0  50

# Workspaces
bind = $mainMod,       1, workspace, 1
bind = $mainMod,       2, workspace, 2
bind = $mainMod,       3, workspace, 3
bind = $mainMod,       4, workspace, 4
bind = $mainMod,       5, workspace, 5
bind = $mainMod,       6, workspace, 6
bind = $mainMod,       7, workspace, 7
bind = $mainMod,       8, workspace, 8
bind = $mainMod,       9, workspace, 9
bind = $mainMod,       0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Switch workspaces 11-20 with mainMod + CTRL + [1-0]
bind = $mainMod CTRL, 1, workspace, 11
bind = $mainMod CTRL, 2, workspace, 12
bind = $mainMod CTRL, 3, workspace, 13
bind = $mainMod CTRL, 4, workspace, 14
bind = $mainMod CTRL, 5, workspace, 15
bind = $mainMod CTRL, 6, workspace, 16
bind = $mainMod CTRL, 7, workspace, 17
bind = $mainMod CTRL, 8, workspace, 18
bind = $mainMod CTRL, 9, workspace, 19
bind = $mainMod CTRL, 0, workspace, 20

# Move active window to workspaces 11-20 with mainMod + CTRL + SHIFT + [1-0]
bind = $mainMod CTRL SHIFT, 1, movetoworkspace, 11
bind = $mainMod CTRL SHIFT, 2, movetoworkspace, 12
bind = $mainMod CTRL SHIFT, 3, movetoworkspace, 13
bind = $mainMod CTRL SHIFT, 4, movetoworkspace, 14
bind = $mainMod CTRL SHIFT, 5, movetoworkspace, 15
bind = $mainMod CTRL SHIFT, 6, movetoworkspace, 16
bind = $mainMod CTRL SHIFT, 7, movetoworkspace, 17
bind = $mainMod CTRL SHIFT, 8, movetoworkspace, 18
bind = $mainMod CTRL SHIFT, 9, movetoworkspace, 19
bind = $mainMod CTRL SHIFT, 0, movetoworkspace, 20

# Mouse
bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow
bindm = ALT,      mouse:272,  movewindow
bindm = ALT,      mouse:273,  resizewindow

# Media / volume
# F1–F3: system volume (swayosd). F4–F6: active media player (playerctl smart selection)
bindel = , F1, exec, swayosd-client --output-volume mute-toggle
bindel = , F2, exec, swayosd-client --output-volume lower
bindel = , F3, exec, swayosd-client --output-volume raise
bindel = , F4, exec, ~/.config/hypr/scripts/playerctl-mediakey.sh play-pause
bindel = , F5, exec, ~/.config/hypr/scripts/playerctl-mediakey.sh previous
bindel = , F6, exec, ~/.config/hypr/scripts/playerctl-mediakey.sh next

bindel = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bindel = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
bindel = , XF86AudioMicMute,      exec, swayosd-client --input-volume mute-toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPrev,         exec, playerctl previous
bindl  = , XF86AudioNext,         exec, playerctl next
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl  = , Caps_Lock,             exec, swayosd-client --caps-lock

# Panel / utilities (Quickshell removed — AGS bar + stock apps). Super+X: ags -q then autostart_ags.sh.
bind = $mainMod,      C,      exec, xdg-open https://calendar.google.com
bind = $mainMod,      M,      exec, spotify
bind = $mainMod SHIFT, M,      exec, kitty --title "Music Studio" -e ~/.config/hypr/scripts/music-focus.sh
bind = $mainMod,      V,      exec, pavucontrol
bind = $mainMod,      N,      exec, nm-connection-editor
bind = $mainMod,      T,      exec, notify-send "Timer" "Add a timer app or extend ~/.config/ags/config.js"
bind = $mainMod SHIFT, T,      exec, notify-send "FocusTime" "Stats: ~/.cache/focustime/focustime_state.json"
bind = $mainMod,      A,      exec, notify-send "Notifications" "dunst is running — see history: dunstctl history"
bind = $mainMod,      W,      exec, bash ~/.config/hypr/scripts/wallpaper-pick-and-apply.sh
bind = $mainMod,      I,      exec, xdg-open https://wiki.hyprland.org/
bind = $mainMod CTRL, S,      exec, qt6ct
bind = $mainMod ALT,  M,      exec, notify-send "Displays" "Use wdisplays/nwg-displays or hyprctl keyword monitor"
bind = $mainMod,      X,      exec, bash -c 'ags -q; bash ~/.config/hypr/scripts/autostart_ags.sh'

source = ~/.config/hypr/windowrules.conf

# SwayOSD - no animation
layerrule = noanim, swayosd
