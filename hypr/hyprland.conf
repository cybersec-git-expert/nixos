monitor=DP-3,3440x1440@165,0x1080,1
monitor=HDMI-A-1,1920x1080@100,760x0,1.0

# Force workspace placement (alternate per monitor):
# Odd workspaces → HDMI-A-1 (MSI), Even workspaces → DP-3 (HP)
workspace = 1,  monitor:HDMI-A-1
workspace = 2,  monitor:DP-3
workspace = 3,  monitor:HDMI-A-1
workspace = 4,  monitor:DP-3
workspace = 5,  monitor:HDMI-A-1
workspace = 6,  monitor:DP-3
workspace = 7,  monitor:HDMI-A-1
workspace = 8,  monitor:DP-3
workspace = 9,  monitor:HDMI-A-1
workspace = 10, monitor:DP-3
workspace = 11, monitor:HDMI-A-1
workspace = 12, monitor:DP-3
workspace = 13, monitor:HDMI-A-1
workspace = 14, monitor:DP-3
workspace = 15, monitor:HDMI-A-1
workspace = 16, monitor:DP-3
workspace = 17, monitor:HDMI-A-1
workspace = 18, monitor:DP-3
workspace = 19, monitor:HDMI-A-1
workspace = 20, monitor:DP-3

$terminal    = kitty
$fileManager = dolphin
$launcher    = rofi -show drun
$browser     = brave

# Autostart
exec-once = systemctl --user start hyprpolkitagent
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = swayosd-server --top-margin 0.06
exec-once = udiskie --tray
exec-once = nm-applet
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = sleep 3 && ~/.config/hypr/scripts/set-default-audio.sh --watch
exec-once = bash ~/.config/hypr/scripts/quickshell/autostart_quickshell.sh

# Environment
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = WLR_NO_HARDWARE_CURSORS,1
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = LIBSEAT_BACKEND,logind
env = NIXOS_OZONE_WL,1
env = GTK_THEME,Adwaita:dark
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_PLUGIN_PATH,/run/current-system/sw/lib/qt-6/plugins
env = QT_SCALE_FACTOR,1

general {
    gaps_in = 10
    gaps_out = 20
    border_size = 0
    col.active_border = rgba(33ccffee)
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    extend_border_grab_area = 20
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.8
    dim_inactive = true
    dim_strength = 0.1
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        noise = 0.02
        contrast = 1.1
        brightness = 1.2
        vibrancy = 0.3
        vibrancy_darkness = 0.2
        popups = true
        popups_ignorealpha = 0.6
        special = false
    }
}

animations {
    enabled = yes
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = quick, 0.15, 0, 0.1, 1
    bezier = bouncy, 0.1, 0.9, 0.2, 1.1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    animation = windows,          1, 5, overshot,    popin 80%
    animation = windowsIn,        1, 5, overshot,    popin 80%
    animation = windowsOut,       1, 5, quick,       popin 80%
    animation = windowsMove,      1, 5, bouncy
    animation = fadeIn,           1, 3, easeOutQuint
    animation = fadeOut,          1, 3, easeOutQuint
    animation = fade,             1, 4, easeOutQuint
    animation = workspaces,       1, 5, overshot,    slide
    animation = specialWorkspace, 1, 5, overshot, slidevert
    animation = border,           1, 4, easeOutQuint
    animation = layers,           1, 5, easeOutQuint, fade
    animation = layersIn,         1, 5, easeOutQuint, fade
    animation = layersOut,        1, 3, quick,        fade
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    # NVIDIA + some clients: VFR can cause visible flicker/frame skipping.
    vfr = false
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = no
    }
}

gestures {
    workspace_swipe_distance = 300
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_min_speed_to_force = 30
}

$mainMod = SUPER

# Apps
bind = $mainMod,       RETURN, exec, $terminal
bind = $mainMod,       TAB,    exec, $launcher
bind = $mainMod,       E,      exec, $fileManager
bind = $mainMod,       B,      exec, $browser
bind = $mainMod,       G,      exec, code --ozone-platform=wayland
bind = $mainMod,       O,      exec, obsidian obsidian://vault/Cyber
bind = $mainMod,       F5,     exec, kitty -e btop

# Window management
bind = $mainMod,       Q,   exec, ~/.config/hypr/scripts/confirm_close.sh
bind = $mainMod SHIFT, Q,      exec, ~/.config/hypr/scripts/rofi-power-menu.sh
bind = $mainMod,       F,   togglefloating
bind = $mainMod,       F11, fullscreen, 1
bind = $mainMod,       J,   togglesplit
bind = $mainMod,       L,   exec, ~/.config/hypr/scripts/hyprlock-with-wallpaper.sh
bind = $mainMod,       R,   exec, hyprctl reload

# Screenshots
bind = , PRINT,           exec, bash ~/.config/hypr/scripts/screenshot.sh --menu
bind = $mainMod SHIFT, S, exec, bash ~/.config/hypr/scripts/screenshot.sh --area

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Resize floating windows
bind = $mainMod CTRL, H, resizeactive, -50 0
bind = $mainMod CTRL, L, resizeactive,  50 0
bind = $mainMod CTRL, K, resizeactive, 0 -50
bind = $mainMod CTRL, J, resizeactive, 0  50

# Workspaces
bind = $mainMod,       1, workspace, 1
bind = $mainMod,       2, workspace, 2
bind = $mainMod,       3, workspace, 3
bind = $mainMod,       4, workspace, 4
bind = $mainMod,       5, workspace, 5
bind = $mainMod,       6, workspace, 6
bind = $mainMod,       7, workspace, 7
bind = $mainMod,       8, workspace, 8
bind = $mainMod,       9, workspace, 9
bind = $mainMod,       0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Switch workspaces 11-20 with mainMod + CTRL + [1-0]
bind = $mainMod CTRL, 1, workspace, 11
bind = $mainMod CTRL, 2, workspace, 12
bind = $mainMod CTRL, 3, workspace, 13
bind = $mainMod CTRL, 4, workspace, 14
bind = $mainMod CTRL, 5, workspace, 15
bind = $mainMod CTRL, 6, workspace, 16
bind = $mainMod CTRL, 7, workspace, 17
bind = $mainMod CTRL, 8, workspace, 18
bind = $mainMod CTRL, 9, workspace, 19
bind = $mainMod CTRL, 0, workspace, 20

# Move active window to workspaces 11-20 with mainMod + CTRL + SHIFT + [1-0]
bind = $mainMod CTRL SHIFT, 1, movetoworkspace, 11
bind = $mainMod CTRL SHIFT, 2, movetoworkspace, 12
bind = $mainMod CTRL SHIFT, 3, movetoworkspace, 13
bind = $mainMod CTRL SHIFT, 4, movetoworkspace, 14
bind = $mainMod CTRL SHIFT, 5, movetoworkspace, 15
bind = $mainMod CTRL SHIFT, 6, movetoworkspace, 16
bind = $mainMod CTRL SHIFT, 7, movetoworkspace, 17
bind = $mainMod CTRL SHIFT, 8, movetoworkspace, 18
bind = $mainMod CTRL SHIFT, 9, movetoworkspace, 19
bind = $mainMod CTRL SHIFT, 0, movetoworkspace, 20

# Mouse
bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow
bindm = ALT,      mouse:272,  movewindow
bindm = ALT,      mouse:273,  resizewindow

# Media / volume
# F1–F3: system volume (swayosd). F4–F6: active media player (playerctl smart selection)
bindel = , F1, exec, swayosd-client --output-volume mute-toggle
bindel = , F2, exec, swayosd-client --output-volume lower
bindel = , F3, exec, swayosd-client --output-volume raise
bindel = , F4, exec, ~/.config/hypr/scripts/playerctl-mediakey.sh play-pause
bindel = , F5, exec, ~/.config/hypr/scripts/playerctl-mediakey.sh previous
bindel = , F6, exec, ~/.config/hypr/scripts/playerctl-mediakey.sh next

bindel = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bindel = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
bindel = , XF86AudioMicMute,      exec, swayosd-client --input-volume mute-toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPrev,         exec, playerctl previous
bindl  = , XF86AudioNext,         exec, playerctl next
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl  = , Caps_Lock,             exec, swayosd-client --caps-lock

# Quickshell panel toggles
bind = $mainMod,      C,      exec, ~/.config/hypr/scripts/quickshell-panel.sh toggle calendar
bind = $mainMod,      M,      exec, ~/.config/hypr/scripts/quickshell-panel.sh toggle music
bind = $mainMod SHIFT, M,      exec, kitty --title "Music Studio" -e ~/.config/hypr/scripts/music-focus.sh
bind = $mainMod,      V,      exec, ~/.config/hypr/scripts/quickshell-panel.sh toggle volume
bind = $mainMod,      N,      exec, ~/.config/hypr/scripts/quickshell-panel.sh toggle network
bind = $mainMod,      T,      exec, ~/.config/hypr/scripts/quickshell-panel.sh toggle timer
bind = $mainMod SHIFT, T,      exec, ~/.config/hypr/scripts/quickshell-panel.sh toggle focustime
bind = $mainMod,      A,      exec, ~/.config/hypr/scripts/quickshell-panel.sh toggle notifications
bind = $mainMod,      W,      exec, ~/.config/hypr/scripts/quickshell-panel.sh toggle wallpaper
bind = $mainMod,      I,      exec, ~/.config/hypr/scripts/qs_manager.sh toggle guide
bind = $mainMod CTRL, S,      exec, ~/.config/hypr/scripts/qs_manager.sh toggle settings
bind = $mainMod ALT,  M,      exec, ~/.config/hypr/scripts/quickshell-panel.sh toggle monitors
bind = $mainMod,      ESCAPE, exec, ~/.config/hypr/scripts/quickshell-panel.sh close
bind = $mainMod,      X,      exec, bash -c "pkill -f 'quickshell.*Main\\.qml'; pkill -f 'quickshell.*TopBar\\.qml'; sleep 0.5; bash ~/.config/hypr/scripts/quickshell/autostart_quickshell.sh"

# Float rules
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$

# SwayOSD - no animation
layerrule = noanim, swayosd

# Quickshell: blur layer surfaces (bar, popups) with semi‑transparent tints
layerrule = blur, ^(quickshell.*)$
layerrule = ignorealpha 0.25, ^(quickshell.*)$
