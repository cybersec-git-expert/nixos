# Generated from qs_colors.json — do not edit by hand

general {
    hide_cursor = true
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

background {
    monitor =
    path = /home/cyberexpert/.config/wallpaper-manager/lock_background.png
    color = rgba(100d12ff)

    blur_passes = 0
    blur_size = 7
    noise = 0.0117
    contrast = 0.8000
    brightness = 0.5000
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M:%S")"
    color = rgba(e7e0e8ff)
    font_size = 80
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(e7e0e8b3)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] id -un
    color = rgba(958e99d9)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:86400000] echo "Enter password to unlock"
    color = rgba(958e99a6)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, -88
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 350, 45
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(d7bafbee)
    inner_color = rgba(00000000)
    font_color = rgba(e7e0e8ff)
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text =
    hide_input = false
    rounding = 20
    check_color = rgba(4c4357ff)
    fail_color = rgba(ffb4abff)
    fail_text = $FAIL <b>($ATTEMPTS)</b>
    fail_transition = 300
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false

    position = 0, -50
    halign = center
    valign = center
}
